#spring.application.name=OkfgDRMAdapter  # dooray-drm.spay.sginfra.net
application:
        title: OkfgDRMAdapter
        version: 1.0
spring:
  profiles:
    default: local
server:
    port: 9001

# Swagger ?? /swagger-ui/index.html
springdoc:
  api-docs.path: /api-docs
  swagger-ui:
    path: /docs
  packages-to-scan: com.okfg.drm.adapter.biz.controller
  paths-to-match: /v1/**

---
spring:
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  config:
    activate:
      on-profile: local
drm:
  testFile: "${user.dir}/src/main/resources/markany_local_test/testFiles/"
  groupId: "System"
  doorayFilePath: "${user.dir}/dooray/{seq}/"   # 상대경로 로컬 생성
  jwt:
    secret: "9386d7c69da34674a8f9dce6332c78b4c9b328af85ee02999c24509f94d74b1e"
    issuer: "spay"
  markanyFile: "/home/onboarding/SAFER45/java/MarkAnyDrmInfo.dat"
  fileExt : "doc;docx;xls;xlsx;xlsm;ppt;pptx;hwp;hwpx;pdf;bmp;gif;jpg;jpeg;tif;tiff;csv;txt"

